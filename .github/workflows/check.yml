name: Lightning Lane watch

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (GitHub may delay 5-20 min under load)
  workflow_dispatch:         # lets you run it manually from the Actions tab

permissions:
  contents: write            # needed to commit state.json back

concurrency:
  group: ll-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Lightning Lane availability
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python check_lightning_lanes.py

      - name: Persist state between runs
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "ll-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git pull --rebase
            git push
          fi
